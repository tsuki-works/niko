name: Firestore Rules Tests

on:
  push:
    branches: [master]
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - 'firestore-rules/**'
      - '.github/workflows/firestore-rules-test.yml'
  pull_request:
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - 'firestore-rules/**'
      - '.github/workflows/firestore-rules-test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: firestore-rules

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # The Firestore emulator runs on the JVM.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install firebase-tools
        run: npm install -g firebase-tools@13

      - name: Install test deps
        run: npm install

      - name: Run rules tests against the emulator
        # `firebase emulators:exec` boots the Firestore emulator on the
        # port from firebase.json (../firebase.json), runs the command,
        # and tears the emulator down on exit.
        run: firebase emulators:exec --only firestore --project niko-tsuki-rules-test --config ../firebase.json "npm test"
